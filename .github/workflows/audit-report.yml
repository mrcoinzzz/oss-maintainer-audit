name: Maintainer Audit Report

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate maintainer audit report
        run: |
          PYTHONPATH=src python -m oss_maintainer_audit.cli . --format markdown --min-score 80 > /tmp/maintainer-audit.md
          cat /tmp/maintainer-audit.md >> "$GITHUB_STEP_SUMMARY"
